<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#131315">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }
    </script>
    <meta charset="UTF-8">
    <title>Omnideck - Ultimate Premium Edition con IA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- VARIABLES Y RESET --- */
        :root {
            --bg-app: linear-gradient(160deg, #131315 0%, #0a0a0c 100%);
            --surface-color: rgba(30, 30, 34, 0.6);
            --surface-light: rgba(45, 45, 50, 0.8);
            --gold: #e6c27a;
            --gold-gradient: linear-gradient(135deg, #f5d796 0%, #b38b36 100%);
            --gold-dim: rgba(230, 194, 122, 0.15);
            --text-main: #fcfcfc;
            --text-muted: #8e8e93;
            --success: #32d74b;
            --danger: #ff453a;
            --accent-ai: #bf5af2;
            --ai-gradient: linear-gradient(135deg, #bf5af2 0%, #7d26cd 100%);
            --ai-dim: rgba(191, 90, 242, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- AJUSTES PARA PANTALLA COMPLETA IPHONE 16 --- */
        html {
            /* Usamos el mismo color de fondo que el inicio de tu app */
            background-color: #131315; 
            height: 100%;
        }

        body {
            /* Aplicamos tu degradado a todo el cuerpo para que no haya bordes negros */
            background: var(--bg-app);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh; /* Altura dinámica real */
            width: 100vw;
            margin: 0;
            overflow: hidden;
            color: var(--text-main);
        }

        #app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            background: transparent; /* Ahora el fondo lo da el body */
        }

        /* --- HEADER ADAPTADO A LA ISLA DINÁMICA --- */
        header {
            flex-shrink: 0;
            /* El padding superior se ajusta automáticamente según el notch/isla del iPhone */
            padding: calc(15px + env(safe-area-inset-top)) 25px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 0.5px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bt-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--danger);
            box-shadow: 0 0 12px var(--danger);
            transition: all 0.4s ease;
        }
        .bt-indicator.connected {
            background-color: var(--success);
            box-shadow: 0 0 12px var(--success);
        }

        /* --- ÁREA DE CONTENIDO --- */
        main {
            flex: 1;
            overflow-y: auto;
            position: relative;
            scroll-behavior: smooth;
            padding-bottom: 20px;
        }
        main::-webkit-scrollbar { display: none; }

        .page {
            display: none;
            padding: 0 25px 120px; 
            animation: fadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-bottom: 18px;
            margin-top: 10px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* --- GRID DE BARAJAS --- */
        .decks-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .card-btn {
            background: var(--surface-color);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 22px; 
            padding: 20px 5px;
            text-align: center;
            color: var(--text-muted);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
        }
        .card-btn.active {
            border-color: var(--gold);
            background: var(--gold-dim);
            color: var(--gold);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(230, 194, 122, 0.15);
        }
        .card-btn i { font-size: 1.8rem; }
        .card-btn span { font-size: 0.75rem; font-weight: 600; }

        /* --- LISTA DE JUEGOS --- */
        .list-item {
            background: var(--surface-color);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 14px;
            backdrop-filter: blur(10px);
        }
        .list-item i {
            font-size: 1.5rem;
            color: var(--text-main);
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
        }
        .list-item-content h3 { font-size: 1rem; margin-bottom: 4px; font-weight: 600; }
        .list-item-content p { font-size: 0.8rem; color: var(--text-muted); }

        /* --- BOTONES --- */
        .primary-btn {
            background: var(--gold-gradient);
            border: none;
            color: #111;
            width: 100%;
            padding: 18px;
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 20px rgba(230, 194, 122, 0.2);
        }
        .primary-btn.ai-btn {
            background: var(--ai-gradient);
            color: #fff;
            box-shadow: 0 8px 20px rgba(191, 90, 242, 0.3);
            margin-top: 20px;
        }

        /* --- BOTÓN FLOTANTE SINCRONIZAR --- */
        #floating-sync-wrapper {
            position: absolute;
            /* Lo subimos para que no lo tape la barra de navegación ni la safe area */
            bottom: calc(85px + env(safe-area-inset-bottom)); 
            left: 0;
            width: 100%;
            padding: 20px 25px;
            background: linear-gradient(to top, #0a0a0c 40%, rgba(10,10,12,0) 100%);
            z-index: 20;
        }

        /* --- BARRA DE NAVEGACIÓN SIEMPRE ABAJO --- */
        nav {
            flex-shrink: 0;
            background: rgba(15, 15, 18, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            /* Padding inferior extra para respetar la línea de inicio del iPhone */
            padding: 15px 10px calc(10px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(255,255,255,0.03);
            z-index: 30;
        }
        .nav-item {
            color: #555;
            text-align: center;
            font-size: 0.72rem;
            transition: all 0.3s;
            position: relative;
            flex: 1;
        }
        .nav-item i { font-size: 1.35rem; margin-bottom: 5px; display: block; }
        .nav-item.active { color: var(--text-main); font-weight: 600; }
        .nav-item.active i { color: var(--gold); transform: translateY(-3px); }
        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background-color: var(--gold);
            border-radius: 50%;
        }

        /* --- FORMULARIOS --- */
        .form-group {
            margin-bottom: 18px;
            background: var(--surface-color);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.8rem; color: var(--accent-ai); }
        .form-control {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
            outline: none;
        }

        .ia-response {
            background: var(--surface-light);
            border-left: 4px solid var(--accent-ai);
            padding: 18px;
            border-radius: 16px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-spade"></i> OMNIDECK
            </div>
            <div id="bt-global-indicator" class="bt-indicator"></div>
        </header>

        <main id="main-content">
            <section id="page-games" class="page active">
                <h2>Mis Barajas</h2>
                <div class="decks-grid" id="deck-selector">
                    <div class="card-btn active" onclick="selectDeck(this, 'Española')">
                        <i class="fa-solid fa-khanda"></i><span>Española</span>
                    </div>
                    <div class="card-btn" onclick="selectDeck(this, 'Póker')">
                        <i class="fa-solid fa-diamond"></i><span>Póker</span>
                    </div>
                    <div class="card-btn" onclick="selectDeck(this, 'UNO')">
                        <i class="fa-solid fa-palette"></i><span>UNO</span>
                    </div>
                </div>

                <h2>Juegos Destacados</h2>
                <div id="games-list">
                    <div class="list-item">
                        <i class="fa-solid fa-coins"></i>
                        <div class="list-item-content">
                            <h3>Truco Argentino</h3>
                            <p>Baraja Española • 2-6 Jugadores</p>
                        </div>
                    </div>
                    <div class="list-item">
                        <i class="fa-solid fa-crown"></i>
                        <div class="list-item-content">
                            <h3>Texas Hold'em</h3>
                            <p>Baraja Póker</p>
                        </div>
                    </div>
                </div>
            </section>

            <section id="page-connect" class="page">
                <h2>Conexión</h2>
                <div style="text-align: center; padding: 40px 0;">
                    <i id="bt-large-icon" class="fa-brands fa-bluetooth-b" style="font-size: 5rem; color: rgba(255,255,255,0.05);"></i>
                    <h3 id="bt-status-text" style="margin-top: 20px;">Desconectado</h3>
                </div>
                <button id="btn-connect" class="primary-btn" onclick="toggleBluetooth()">Conectar</button>
            </section>

            <section id="page-ai" class="page">
                <h2>Creación IA</h2>
                <div class="form-group">
                    <label>Tipo de Baraja</label>
                    <select id="tipoBaraja" class="form-control">
                        <option value="espanola">Española</option>
                        <option value="francesa">Póker</option>
                    </select>
                </div>
                <button class="primary-btn ai-btn" onclick="generarLogicaIA()">Generar con IA</button>
                <div id="iaOutput" class="ia-response">
                    <strong id="iaSugestion"></strong>
                </div>
            </section>
        </main>

        <div id="floating-sync-wrapper">
            <button id="main-sync-btn" class="primary-btn" onclick="syncSelectedDeck()">
                <i class="fa-brands fa-bluetooth-b"></i> Sincronizar Española
            </button>
        </div>

        <nav>
            <div class="nav-item active" onclick="switchTab('page-games', this)">
                <i class="fa-solid fa-layer-group"></i><span>Barajas</span>
            </div>
            <div class="nav-item" onclick="switchTab('page-connect', this)">
                <i class="fa-brands fa-bluetooth"></i><span>Conexión</span>
            </div>
            <div class="nav-item" onclick="switchTab('page-ai', this)">
                <i class="fa-solid fa-wand-magic-sparkles"></i><span>IA</span>
            </div>
        </nav>
    </div>

    <script>
        function switchTab(pageId, navElement) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('floating-sync-wrapper').style.display = (pageId === 'page-games') ? 'block' : 'none';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            navElement.classList.add('active');
        }

        function selectDeck(el, name) {
            document.querySelectorAll('.card-btn').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('main-sync-btn').innerText = 'Sincronizar ' + name;
        }

        function syncSelectedDeck() { switchTab('page-connect', document.querySelectorAll('.nav-item')[1]); }

        function toggleBluetooth() {
            const status = document.getElementById('bt-status-text');
            status.innerText = 'Conectado';
            status.style.color = '#32d74b';
        }

        function generarLogicaIA() {
            document.getElementById('iaSugestion').innerText = "Reglas optimizadas generadas.";
            document.getElementById('iaOutput').style.display = 'block';
        }
    </script>
</body>
</html>
